name: Audit

on:
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Inventory check
        run: python scripts/audit_inventory.py

      - name: Config schema check
        run: python scripts/config_utils.py validate config.yml.example

      - name: Tests
        run: pytest scripts/tests/ -q --ignore=scripts/tests/test_memory_validator.py
