name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate config schema
        run: sh scripts/config_utils.py validate config.yml.example

      - name: Audit agent/skill inventory
        run: sh scripts/audit_inventory.py

      - name: Bootstrap project state for tests
        run: |
          cp config.yml.example config.yml
          sh scripts/setup_projects.py

      - name: Run tests
        run: pytest scripts/tests/ tests/ -q
