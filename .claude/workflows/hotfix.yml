# Hotfix Route Workflow Definition
# Purpose: Production bug fix, config change, or small isolated change
# Duration: Hours, not days
# Phases: 4 (H1-H4)

name: Hotfix
description: Production bug fix, config change, or small isolated change
route_id: hotfix
estimated_duration: hours

# Trigger conditions
triggers:
  - condition: Production bug
  - condition: Config change
  - condition: Small isolated change (<50 lines)
  - condition: Urgent fix needed
  - condition: No formal requirements needed

# Brief Phase
planning:
  - id: H1
    name: Brief
    skill: none  # User provides description
    agent: none
    inputs:
      - User provides 1-paragraph description
      - Target files identified
    outputs:
      - Verbal confirmation of scope
    gate:
      condition: User confirms scope
      validation: Clear understanding of fix
    on_failure: halt

# Execution Phase
execution:
  - id: H2
    name: Implement
    skill: implement
    agent: developer
    depends_on: [ H1 ]
    inputs:
      - User description
      - Jira story (optional)
      - Repo context (from user or config)
    outputs:
      - Code on story/<STORY-KEY> branch
      - Tests (if applicable)
    gate:
      condition: Code written, tests pass, build green
      validation: Fix verified locally
    on_failure: halt

  - id: H3
    name: Code Review
    skill: review-code
    agent: review-agent
    depends_on: [ H2 ]
    inputs:
      - Code on story/<STORY-KEY> branch
    outputs:
      - docs/features/<feature-name>/reviews/code-review-*.md
    gate:
      condition: 0 critical/high issues
      validation: Quick review (< 1 hour)
    on_failure: loop_to_H2
    max_iterations: 2

  - id: H4
    name: Create PR
    command: create-pr
    agent: developer
    depends_on: [ H3 ]
    inputs:
      - story/<STORY-KEY> branch
    outputs:
      - Pull Request (story → master)
    gate:
      condition: PR approved by human
      validation: Human merge boundary
    on_failure: halt

# Branch Strategy
branches:
  base: master (or main/stable)
  hotfix: story/<STORY-KEY>
  merge_sequence:
    - story → master (after H4)

# Artifact Locations
artifacts:
  execution: docs/features/<slug>/execution/reviews/
  no_planning_artifacts: true  # No PRD, no TDD

# Quality Standards
quality:
  - Code review: mandatory (but expedited)
  - Tests: required if logic change
  - Build: must be green
  - QA: optional (human decision)

# Estimated Timings
timings:
  implementation: 30 min - 2 hours
  code_review: 15-30 min
  merge: 15 min
  total: 1-3 hours
